# Redis 配置 - 用于持久化聊天记忆，服务器重启后不丢失
spring:
  data:
    redis:
      host: localhost
      port: 6379
      # password:  # 若 Redis 有密码则取消注释并填写

# 通过 ${API_KEY} 从本机环境变量引入，不在配置中硬编码
langchain4j:
  community:
    redis:
      host: localhost
      port: 6379
      # password:  # 若 Redis 有密码则取消注释并填写
    dashscope:
      stream-chat-model:
        api-key: ${API_KEY}
        model-name: qwen-plus
        log-requests: true
        log-responses: true
      chat-model:
        api-key: ${API_KEY}
        model-name: qwen-plus
        # LangChain4j 请求/响应日志
        log-requests: true
        log-responses: true
      # RAG 向量化使用通义 Embedding 模型（中文效果更好）
      embedding-model:
        api-key: ${API_KEY}
        model-name: text-embedding-v2
        log-requests: true
        log-responses: true

# 日志配置
logging:
  level:
    root: INFO
    com.example.langchain4jdemo: DEBUG
    dev.langchain4j: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
