<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 对话</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
            min-height: 100vh;
            transition: background 0.3s;
        }
        body.dark {
            background: #1a1a2e;
        }
        .chat-container {
            max-width: 720px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
            transition: background 0.3s, box-shadow 0.3s;
        }
        body.dark .chat-container {
            background: #252540;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        .chat-header {
            padding: 16px 20px;
            background: #1a1a2e;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        body.dark .chat-header {
            background: #16162a;
        }
        .theme-toggle {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .theme-toggle:hover {
            background: rgba(255,255,255,0.3);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fff;
            transition: background 0.3s;
        }
        body.dark .chat-messages {
            background: #252540;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #1a1a2e;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        body.dark .message.user {
            background: #3d3d5c;
        }
        .message.assistant {
            align-self: flex-start;
            background: #e8e8e8;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        body.dark .message.assistant {
            background: #3d3d5c;
            color: #e0e0e0;
        }
        .message.error {
            align-self: flex-start;
            background: #fee;
            color: #c33;
        }
        body.dark .message.error {
            background: #4a2a2a;
            color: #f88;
        }
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
            background: #fff;
            transition: background 0.3s, border-color 0.3s;
        }
        body.dark .chat-input-area {
            background: #252540;
            border-color: #3d3d5c;
        }
        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            background: #fff;
            color: #333;
            transition: border-color 0.2s, background 0.3s, color 0.3s;
        }
        #messageInput:focus {
            border-color: #1a1a2e;
        }
        body.dark #messageInput {
            background: #2d2d48;
            border-color: #3d3d5c;
            color: #e0e0e0;
        }
        body.dark #messageInput::placeholder {
            color: #888;
        }
        #sendBtn {
            padding: 12px 24px;
            background: #1a1a2e;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }
        #sendBtn:hover {
            background: #2d2d44;
        }
        #sendBtn:disabled {
            background: #999;
            cursor: not-allowed;
        }
        body.dark #sendBtn:hover:not(:disabled) {
            background: #3d3d5c;
        }
        .loading {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <span>AI 助手（通义千问）</span>
            <button class="theme-toggle" id="themeToggle" title="切换日/夜模式">☀️</button>
        </div>
        <div class="chat-messages" id="messages"></div>
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const themeToggle = document.getElementById('themeToggle');

        function isDark() { return document.body.classList.contains('dark'); }
        function setTheme(dark) {
            document.body.classList.toggle('dark', dark);
            themeToggle.textContent = dark ? '🌙' : '☀️';
            themeToggle.title = dark ? '切换到白天模式' : '切换到黑夜模式';
            localStorage.setItem('theme', dark ? 'dark' : 'light');
        }
        themeToggle.addEventListener('click', () => setTheme(!isDark()));
        setTheme(localStorage.getItem('theme') === 'dark');

        // 使用 sessionStorage：每个浏览器标签页/窗口独立会话，多开窗口时记忆隔离
        const sessionId = sessionStorage.getItem('chatSessionId') || (() => {
            const id = 's_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
            sessionStorage.setItem('chatSessionId', id);
            return id;
        })();

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.textContent = text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            inputEl.value = '';
            sendBtn.disabled = true;

            const loadingEl = document.createElement('div');
            loadingEl.className = 'message assistant loading';
            loadingEl.textContent = '思考中...';
            messagesEl.appendChild(loadingEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;

            try {
                const resp = await fetch('/chat?sessionId=' + encodeURIComponent(sessionId) + '&message=' + encodeURIComponent(text));
                loadingEl.remove();
                if (resp.ok) {
                    const reply = await resp.text();
                    addMessage(reply || '(无回复)', 'assistant');
                } else {
                    addMessage('请求失败: ' + resp.status, 'error');
                }
            } catch (e) {
                loadingEl.remove();
                addMessage('网络错误: ' + e.message, 'error');
            }
            sendBtn.disabled = false;
            inputEl.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        inputEl.focus();
    </script>
</body>
</html>
